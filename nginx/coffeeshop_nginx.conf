server {
  listen 8088; # nginx listen this port
  charset     utf8;

  access_log  /app/www/coffeeshop/logs/coffeeshop_access.log;
  error_log   /app/www/coffeeshop/logs/coffeeshop_error.log error;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/srt-tester.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srt-tester.ru/privkey.pem;

    location / {
        proxy_pass http://coffeeshop:8000; # gunicorn listen port 8000
        proxy_set_header X-Url-Scheme $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    location /static/ { root /app/www/coffeeshop; }
    location /media/ { root /app/www/coffeeshop; }
}